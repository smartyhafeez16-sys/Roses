<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mimi 💖</title>

<style>
body {
    margin:0;
    padding:0;
    background: linear-gradient(to bottom,#ff9ecf,#ffe6f2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    overflow:hidden;
    transition:1s;
}

.title {
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:35px;
    color:#ff1493;
    font-weight:bold;
}

.container{text-align:center;}
.hidden{display:none;}

.rose{
    width:200px;
    cursor:pointer;
    transition:1s;
}

.image-reveal{
    width:280px;
    border-radius:20px;
    opacity:0;
    transform:scale(.7);
    transition:1.5s;
}

.show{opacity:1;transform:scale(1);}

.notification{
    position:fixed;
    top:100px;
    left:50%;
    transform:translateX(-50%);
    background:#ff69b4;
    color:white;
    padding:12px 25px;
    border-radius:25px;
    cursor:pointer;
    z-index:999;
    font-weight:bold;
    box-shadow:0 0 10px pink;
}

.heart{
    position:absolute;
    bottom:-20px;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);opacity:0;}
}

.message{
    position:fixed;
    bottom:50px;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    text-align:center;
    font-weight:bold;
    text-shadow:0 0 10px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div class="title">Tap to see 💖</div>

<!-- Notifications -->
<div class="notification" id="startNote">Click here to see Pink Rose 🌸</div>
<div class="notification hidden" id="nextNote">Click here to see Light Pink Rose 🌷</div>
<div class="notification hidden" id="thirdNote">Click here to see Yellow Rose 🌼</div>
<div class="notification hidden" id="fourthNote">Click here to see Green Rose 🌿</div>
<div class="notification hidden" id="fifthNote">Click here to see White Rose 🤍</div>
<div class="notification hidden" id="sixthNote">Click here to see White Rose 🤍</div>
<div class="notification hidden" id="seventhNote">Click here to see Black Rose 🖤</div>

<div id="hearts"></div>

<div class="container">

<!-- Roses -->
<img src="https://i.ibb.co/7QpKsCX/rose.png" class="rose hidden" id="rose1">
<img src="https://i.ibb.co/7QpKsCX/rose.png" class="rose hidden" id="rose2">
<img src="https://i.ibb.co/7QpKsCX/rose.png" class="rose hidden" id="rose3">
<img src="https://i.ibb.co/7QpKsCX/rose.png" class="rose hidden" id="rose4">
<img src="https://i.ibb.co/7QpKsCX/rose.png" class="rose hidden" id="rose5">
<img src="https://i.ibb.co/7QpKsCX/rose.png" class="rose hidden" id="rose6">
<img src="https://i.ibb.co/7QpKsCX/rose.png" class="rose hidden" id="rose7">

<!-- Images -->
<img src="1.png" id="img1" class="image-reveal hidden">
<img src="12.jpeg" id="img2" class="image-reveal hidden">
<img src="3.png" id="img3" class="image-reveal hidden">
<img src="5.png" id="img4" class="image-reveal hidden">
<img src="9.jpeg" id="img5" class="image-reveal hidden">
<img src="9.jpeg" id="img6" class="image-reveal hidden">
<img src="15.jpeg" id="img7" class="image-reveal hidden">

<div id="message" class="message hidden"></div>

</div>

<script>

const msg = document.getElementById('message');
let heartColor="#ff69b4";

// ❤️ Floating hearts
setInterval(()=>{
    let h=document.createElement('div');
    h.className='heart';
    h.innerHTML='❤';
    h.style.left=Math.random()*100+'vw';
    h.style.color=heartColor;
    document.getElementById('hearts').appendChild(h);
    setTimeout(()=>h.remove(),6000);
},300);

// ✨ Typing with color
function typeText(text,color,cb){
    msg.style.display="block";
    msg.style.color=color;
    msg.innerHTML="";
    let i=0;

    let interval=setInterval(()=>{
        msg.innerHTML+=text.charAt(i);
        i++;
        if(i>=text.length){
            clearInterval(interval);
            if(cb) cb();
        }
    },40);
}

// FLOW

startNote.onclick=()=>{
    startNote.style.display='none';
    rose1.classList.remove('hidden');
};

rose1.onclick=()=>{
    rose1.style.display='none';
    img1.classList.remove('hidden');
    setTimeout(()=>img1.classList.add('show'),100);

    typeText("You are my beautiful Pink Rose 🌸💖","#ffffff",()=>{
        nextNote.classList.remove('hidden');
    });
};

nextNote.onclick=()=>{
    nextNote.style.display='none';
    img1.style.display='none';
    rose2.classList.remove('hidden');
};

rose2.onclick=()=>{
    document.body.style.background="linear-gradient(#ffc0cb,#fff0f5)";
    heartColor="#ffb6c1";

    rose2.style.display='none';
    img2.classList.remove('hidden');
    setTimeout(()=>img2.classList.add('show'),100);

    typeText("You are my lovely Light Pink Rose 🌷✨","#ffffff",()=>{
        thirdNote.classList.remove('hidden');
    });
};

thirdNote.onclick=()=>{
    thirdNote.style.display='none';
    img2.style.display='none';
    rose3.classList.remove('hidden');
};

rose3.onclick=()=>{
    document.body.style.background="linear-gradient(#fff9c4,#fffde7)";
    heartColor="#ffd700";

    rose3.style.display='none';
    img3.classList.remove('hidden');
    setTimeout(()=>img3.classList.add('show'),100);

    typeText("You are my sunshine Yellow Rose 🌼💛","#333333",()=>{
        fourthNote.classList.remove('hidden');
    });
};

fourthNote.onclick=()=>{
    fourthNote.style.display='none';
    img3.style.display='none';
    rose4.classList.remove('hidden');
};

rose4.onclick=()=>{
    document.body.style.background="linear-gradient(#c8e6c9,#e8f5e9)";
    heartColor="#00c853";

    rose4.style.display='none';
    img4.classList.remove('hidden');
    setTimeout(()=>img4.classList.add('show'),100);

    typeText("You are my peace, my Green Rose 🌿💚","#ffffff",()=>{
        fifthNote.classList.remove('hidden');
    });
};

fifthNote.onclick=()=>{
    fifthNote.style.display='none';
    img4.style.display='none';
    rose5.classList.remove('hidden');
};

rose5.onclick=()=>{
    document.body.style.background="linear-gradient(#ffffff,#f5f5f5)";
    heartColor="#ffffff";

    rose5.style.display='none';
    img5.classList.remove('hidden');
    setTimeout(()=>img5.classList.add('show'),100);

    typeText("You are my purest White Rose 🤍✨","#333333",()=>{
        sixthNote.classList.remove('hidden');
    });
};

sixthNote.onclick=()=>{
    sixthNote.style.display='none';
    img5.style.display='none';
    rose6.classList.remove('hidden');
};

rose6.onclick=()=>{
    document.body.style.background="linear-gradient(#eeeeee,#ffffff)";
    heartColor="#cccccc";

    rose6.style.display='none';
    img6.classList.remove('hidden');
    setTimeout(()=>img6.classList.add('show'),100);

    typeText("You are my eternal White Rose 🤍🌟","#333333",()=>{
        seventhNote.classList.remove('hidden');
    });
};

seventhNote.onclick=()=>{
    seventhNote.style.display='none';
    img6.style.display='none';
    rose7.classList.remove('hidden');
};

rose7.onclick=()=>{
    document.body.style.background="linear-gradient(#000000,#222222)";
    heartColor="#000000";

    rose7.style.display='none';
    img7.classList.remove('hidden');
    setTimeout(()=>img7.classList.add('show'),100);

    typeText("Even in darkness… you shine like my Black Rose 🖤✨","#ffffff");
};

</script>

</body>
</html>
