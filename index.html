<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mimi 💖</title>

<style>
body {
    margin:0;
    padding:0;
    background: linear-gradient(to bottom,#ff9ecf,#ffe6f2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    overflow:hidden;
    transition:1s;
}

/* TOP TITLE */
.top-title {
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:35px;
    color:#ff1493;
    font-weight:bold;
}

/* CENTER TAP TEXT */
.tap-start {
    position:absolute;
    font-size:40px;
    font-weight:bold;
    color:#ff1493;
    cursor:pointer;
    text-align:center;
}

/* ROSES */
.hidden{display:none;}
.rose{
    width:200px;
    cursor:pointer;
}

.image-reveal{
    width:280px;
    border-radius:20px;
    opacity:0;
    transform:scale(.7);
    transition:1.5s;
}
.show{opacity:1;transform:scale(1);}

/* BUTTON */
.notification{
    position:fixed;
    top:100px;
    left:50%;
    transform:translateX(-50%);
    background:#ff69b4;
    color:white;
    padding:12px 25px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
}

/* HEARTS */
.heart{
    position:absolute;
    bottom:-20px;
    animation:floatUp 6s linear infinite;
}
@keyframes floatUp{
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);opacity:0;}
}

/* MESSAGE */
.message{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    font-weight:bold;
    text-align:center;
    padding:10px 20px;
    border-radius:15px;
    background: rgba(0,0,0,0.4);  /* 🔥 makes text always visible */
    color:white;
}
</style>
</head>

<body>

<div class="top-title">MIMI 💖</div>

<!-- CENTER START -->
<div id="tapStart" class="tap-start">Tap to see 💖</div>

<!-- BUTTONS -->
<div class="notification hidden" id="nextNote">Click here to continue 🌷</div>

<div id="hearts"></div>

<div class="container">

<img src="https://i.ibb.co/7QpKsCX/rose.png" class="rose hidden" id="rose">
<img src="1.png" id="img" class="image-reveal hidden">

<div id="message" class="message hidden"></div>

</div>

<script>

const tapStart = document.getElementById('tapStart');
const rose = document.getElementById('rose');
const img = document.getElementById('img');
const msg = document.getElementById('message');

let step = 0;
let heartColor = "#ff69b4";

// hearts
setInterval(()=>{
 let h=document.createElement('div');
 h.className='heart';
 h.innerHTML='❤';
 h.style.left=Math.random()*100+'vw';
 h.style.color=heartColor;
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},300);

// typing
function typeText(text){
 msg.classList.remove('hidden');
 msg.innerHTML="";
 let i=0;
 let int=setInterval(()=>{
  msg.innerHTML+=text[i];
  i++;
  if(i>=text.length) clearInterval(int);
 },40);
}

// START CLICK
tapStart.onclick=()=>{
 tapStart.style.display='none';
 rose.classList.remove('hidden');
};

// ROSE CLICK FLOW
rose.onclick=()=>{

 img.classList.remove('hidden');
 setTimeout(()=>img.classList.add('show'),100);

 step++;

 if(step===1){
  img.src="1.png";
  document.body.style.background="linear-gradient(#ff9ecf,#ffe6f2)";
  heartColor="#ff69b4";
  typeText(" beautiful Pink Rose 🌸💖");
 }

 else if(step===2){
  img.src="12.jpeg";
  document.body.style.background="linear-gradient(#ffc0cb,#fff0f5)";
  heartColor="#ffb6c1";
  typeText("lovely Light Pink Rose 🌷✨");
 }

 else if(step===3){
  img.src="3.png";
  document.body.style.background="linear-gradient(#fff9c4,#fffde7)";
  heartColor="#ffd700";
  typeText(" sunshine Yellow Rose 🌼💛");
 }

 else if(step===4){
  img.src="5.png";
  document.body.style.background="linear-gradient(#c8e6c9,#e8f5e9)";
  heartColor="#00c853";
  typeText(" peace Green Rose 🌿💚");
 }

 else if(step===5){
  img.src="9.jpeg";
  document.body.style.background="linear-gradient(#ffffff,#f5f5f5)";
  heartColor="#ffffff";
  msg.style.color="black";
  typeText(" purest White Rose 🤍✨");
 }

 else if(step===6){
  img.src="9.jpeg";
  document.body.style.background="linear-gradient(#eeeeee,#ffffff)";
  heartColor="#cccccc";
  msg.style.color="black";
  typeText(" eternal White Rose 🤍🌟");
 }

 else if(step===7){
  img.src="15.jpeg";
  document.body.style.background="linear-gradient(#000000,#222222)";
  heartColor="#000000";
  msg.style.color="white";
  typeText("Even in darkness… you shine like Black Rose 🖤✨");
 }

};

</script>

</body>
</html>
